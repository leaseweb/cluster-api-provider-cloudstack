version: "2"
run:
  go: "1.24"
  build-tags:
    - tools
    - e2e
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - dogsled
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - ginkgolinter
    - goconst
    - gocritic
    - godot
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - intrange
    - loggercheck
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - nosprintfhostport
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - staticcheck
    - thelper
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - whitespace
  settings:
    cyclop:
      max-complexity: 20
    ginkgolinter:
      forbid-focus-container: true
    gocritic:
      disabled-checks:
        - appendAssign
        - dupImport
        - emptyStringTest
        - evalOrder
        - ifElseChain
        - octalLiteral
        - regexpSimplify
        - sloppyReassign
        - truncateCmp
        - typeDefFirst
        - unnamedResult
        - unnecessaryDefer
        - whyNoLint
        - wrapperFunc
        - rangeValCopy
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - performance
    gocyclo:
      min-complexity: 15
    godot:
      scope: toplevel
      exclude:
        - ^ \+.*
        - ^ ANCHOR.*
    goheader:
      values:
        const:
          AUTHOR: The Kubernetes Authors
        regexp:
          YR: \d\d\d\d
      template: |-
        Copyright {{ YR }} {{ AUTHOR }}.

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.
    importas:
      alias:
        - pkg: k8s.io/api/core/v1
          alias: corev1
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apimachinery/pkg/util/errors
          alias: kerrors
        - pkg: sigs.k8s.io/controller-runtime/pkg/conversion
          alias: ctrlconversion
        - pkg: sigs.k8s.io/cluster-api/util/conversion
          alias: utilconversion
        - pkg: k8s.io/apimachinery/pkg/conversion
          alias: machineryconversion
        - pkg: sigs.k8s.io/cluster-api-provider-cloudstack/api/v1beta3
          alias: infrav1
        - pkg: sigs.k8s.io/cluster-api-provider-cloudstack/api/v1beta2
          alias: infrav1beta2
        - pkg: sigs.k8s.io/cluster-api-provider-cloudstack/api/v1beta1
          alias: infrav1beta1
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta2
          alias: clusterv1
        - pkg: sigs.k8s.io/cluster-api/api/core/v1beta1
          alias: clusterv1beta1
        - pkg: sigs.k8s.io/cluster-api/util/deprecated/v1beta1/conditions
          alias: v1beta1conditions
        - pkg: sigs.k8s.io/cluster-api/util/deprecated/v1beta1/patch
          alias: v1beta1patch
      no-unaliased: false
    nestif:
      min-complexity: 8
    nolintlint:
      require-specific: true
      allow-unused: false
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
          arguments:
            - allowedPackages:
                - github.com/onsi/ginkgo/v2
                - github.com/onsi/gomega
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: bool-literal-in-expr
        - name: constant-logical-expr
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gosec
        path: _test\.go
      - linters:
          - staticcheck
        text: 'SA1019: .+LBRuleID is deprecated'
      - linters:
          - staticcheck
        text: 'SA1019: "sigs.k8s.io/cluster-api/(.*)" is deprecated: This package is deprecated and is going to be removed when support for v1beta1 will be dropped.'
      - linters:
          - staticcheck
        text: 'SA1019: scope.Cluster.Status.Deprecated.V1Beta1.Conditions is deprecated'
      - linters:
          - revive
          - staticcheck
        path: (test)/.*.go
        text: should not use dot imports
      - linters:
          - revive
        path: api\/.*\/.*conversion.*\.go$
        text: 'var-naming: don''t use underscores in Go names;'
      - linters:
          - staticcheck
        path: api\/.*\/.*conversion.*\.go$
        text: 'ST1003: should not use underscores in Go names;'
      - linters:
          - govet
        text: non-constant format string in call to sigs\.k8s\.io\/cluster-api\/util\/conditions\.
      - linters:
          - goconst
        path: (.+)_test\.go
    paths:
      - zz_generated.*\.go$
      - pkg/mocks
      - test
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(sigs.k8s.io/cluster-api-provider-cloudstack)
    goimports:
      local-prefixes:
        - sigs.k8s.io/cluster-api-provider-cloudstack
  exclusions:
    generated: lax
    paths:
      - zz_generated.*\.go$
      - pkg/mocks
      - test
      - third_party$
      - builtin$
      - examples$
      - api/v1beta3/webhook_suite_test.go
